<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>letters from myself · internet.house</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Caveat:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #efe6d2;
    --paper-deep: #e8dec5;
    --paper-bright: #f8f1de;
    --ink: #1a1714;
    --ink-soft: #3a342d;
    --ink-faint: #8a8275;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Instrument Serif", Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background-image:
      radial-gradient(rgba(26,23,20,0.045) 1px, transparent 1px),
      radial-gradient(rgba(26,23,20,0.025) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }

  /* ---------- chrome ---------- */
  .chrome {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--ink-faint);
    pointer-events: none;
    mix-blend-mode: multiply;
  }
  .chrome a { color: var(--ink-soft); text-decoration: none; pointer-events: auto; }
  .chrome a:hover { color: var(--ink); }
  .chrome .crumbs { display: flex; gap: 10px; align-items: center; }
  .chrome .crumbs .sep { opacity: 0.4; }

  /* ---------- title ---------- */
  .title {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 24px;
    position: relative;
  }
  .title .eyebrow {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 28px;
  }
  .title h1 {
    font-size: clamp(3.5rem, 11vw, 8rem);
    line-height: 0.95;
    margin: 0;
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .title .chapter {
    margin-top: 36px;
    font-family: "Caveat", cursive;
    font-size: 1.6rem;
    color: var(--ink-soft);
  }
  .title .scroll-hint {
    position: absolute; bottom: 36px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 2px;
    color: var(--ink-faint);
    text-transform: uppercase;
    animation: nudge 2.4s ease-in-out infinite;
  }
  @keyframes nudge {
    0%,100% { transform: translateY(0); opacity: 0.6; }
    50%     { transform: translateY(6px); opacity: 1; }
  }

  /* ---------- scene ---------- */
  .scene { position: relative; padding: 0; }

  .stage {
    position: sticky; top: 0;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr minmax(320px, 42%);
    align-items: center;
    gap: 40px;
    padding: 0 6vw;
  }
  .illo {
    grid-column: 1;
    display: flex; align-items: center; justify-content: center;
    height: 100%;
  }
  .illo svg {
    width: 100%;
    max-width: 640px;
    height: auto;
    max-height: 80vh;
  }
  .dialogue-col {
    grid-column: 2;
    height: 100%;
    display: flex; align-items: center;
    position: relative;
  }
  .dialogue-stack {
    position: relative;
    width: 100%;
    height: 36vh;
    min-height: 240px;
  }
  .line {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    opacity: 0;
    will-change: opacity, transform;
    pointer-events: none;
  }
  .line .who {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .line .who .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink); margin-right: 8px; vertical-align: middle;
  }
  .line p {
    margin: 0;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: clamp(1.5rem, 2.2vw, 2.2rem);
    line-height: 1.3;
    color: var(--ink);
    max-width: 520px;
  }
  .line.shout p {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: clamp(2.2rem, 3.4vw, 3.4rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }
  .line.whisper p {
    color: var(--ink-soft);
    font-style: italic;
  }
  .line.beat p {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.85rem;
    color: var(--ink-faint);
    text-transform: lowercase;
    letter-spacing: 1.5px;
  }

  /* triggers must be in normal flow so their height extends .scene
     and gives .stage somewhere to stick */
  .triggers { position: relative; width: 1px; pointer-events: none; }
  .trigger { /* positioned absolute inline by JS, inside .triggers */ }

  /* ---------- end ---------- */
  .end {
    min-height: 70vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 22px;
    padding: 0 24px 100px;
  }
  .end .ornament {
    font-family: "Caveat", cursive;
    font-size: 2.4rem; color: var(--ink-soft);
  }
  .end .closing {
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink-soft);
    max-width: 520px;
    line-height: 1.5;
  }
  .end .next {
    margin-top: 24px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ---------- mobile ---------- */
  @media (max-width: 820px) {
    .stage {
      grid-template-columns: 1fr;
      grid-template-rows: 50% 50%;
      gap: 0;
      padding: 0 5vw;
    }
    .illo { grid-column: 1; grid-row: 1; }
    .illo svg { max-height: 100%; max-width: 380px; }
    .dialogue-col { grid-column: 1; grid-row: 2; align-items: flex-start; padding-top: 0; }
    .dialogue-stack { height: 38vh; }
    .line p { font-size: clamp(1.25rem, 4.8vw, 1.7rem); max-width: 100%; }
    .line.shout p { font-size: clamp(1.8rem, 7vw, 2.6rem); }
  }
</style>
</head>
<body>

<div class="chrome">
  <div class="crumbs">
    <a href="/">internet.house</a>
    <span class="sep">/</span>
    <span>letters from myself</span>
  </div>
  <div>chapter 01</div>
</div>

<!-- TITLE -->
<section class="title">
  <div class="eyebrow">a story in letters</div>
  <h1>letters from<br/>myself</h1>
  <div class="chapter">chapter one — the cafe on rue daunou</div>
  <div class="scroll-hint">scroll ↓</div>
</section>

<!-- SCENE -->
<section class="scene" id="scene">

  <div class="stage">

    <!-- Illustration: just the letter -->
    <div class="illo">
      <svg viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" aria-label="a sealed letter on cream paper">
        <defs>
          <pattern id="halftone" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
            <circle cx="3" cy="3" r="1.1" fill="#1a1714"/>
          </pattern>
          <pattern id="halftone-fine" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
            <circle cx="2.5" cy="2.5" r="0.7" fill="#1a1714"/>
          </pattern>
          <pattern id="halftone-loose" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse">
            <circle cx="4.5" cy="4.5" r="1.4" fill="#1a1714"/>
          </pattern>
        </defs>

        <!-- soft floor shadow under the envelope -->
        <ellipse cx="320" cy="486" rx="230" ry="14" fill="url(#halftone-fine)" opacity="0.45"/>
        <ellipse cx="320" cy="488" rx="200" ry="9" fill="#1a1714" opacity="0.08"/>

        <!-- envelope, slightly tilted -->
        <g transform="rotate(-3.5 320 290)">

          <!-- envelope body -->
          <rect x="80" y="170" width="480" height="290" rx="3"
                fill="#f8f1de" stroke="#1a1714" stroke-width="3"/>

          <!-- subtle paper grain on envelope -->
          <rect x="80" y="170" width="480" height="290" rx="3"
                fill="url(#halftone-fine)" opacity="0.07"/>

          <!-- the V crease where the closed flap meets the body -->
          <path d="M80,170 L320,330 L560,170"
                fill="none" stroke="#1a1714" stroke-width="3" stroke-linejoin="round"/>

          <!-- inner shadow line on the V (suggests depth) -->
          <path d="M92,176 L320,326 L548,176"
                fill="none" stroke="#1a1714" stroke-width="0.9" opacity="0.45"/>

          <!-- bottom corners — small fold lines -->
          <path d="M80,460 L155,395" stroke="#1a1714" stroke-width="0.7" opacity="0.35"/>
          <path d="M560,460 L485,395" stroke="#1a1714" stroke-width="0.7" opacity="0.35"/>

          <!-- handwritten name -->
          <text x="160" y="408" font-family="Caveat, cursive" font-size="58" font-weight="700"
                fill="#1a1714">Mira</text>
          <!-- handwritten flourish underline -->
          <path d="M160,420 C220,418 285,424 320,418"
                fill="none" stroke="#1a1714" stroke-width="2" stroke-linecap="round"/>
          <!-- small "from yourself" -->
          <text x="160" y="446" font-family="Caveat, cursive" font-size="20"
                fill="#1a1714" opacity="0.55">— from yourself</text>

          <!-- stamp, upper right -->
          <g transform="translate(470,188)">
            <!-- perforated edge halo -->
            <rect x="-3" y="-3" width="76" height="92" fill="#1a1714" opacity="0.06"/>
            <rect x="0" y="0" width="70" height="86"
                  fill="#f8f1de" stroke="#1a1714" stroke-width="2"/>
            <rect x="4" y="4" width="62" height="78"
                  fill="none" stroke="#1a1714" stroke-width="0.6" stroke-dasharray="1.5 2.2" opacity="0.7"/>
            <!-- silhouette: simple eiffel-ish tower -->
            <g stroke="#1a1714" stroke-width="1.6" fill="none" stroke-linejoin="round">
              <path d="M35,72 L26,72 L30,52 L25,52 L33,28 L29,28 L35,12 L41,28 L37,28 L45,52 L40,52 L44,72 L35,72 Z"
                    fill="url(#halftone)" fill-opacity="0.6"/>
              <line x1="22" y1="72" x2="48" y2="72"/>
            </g>
            <text x="35" y="82" text-anchor="middle"
                  font-family="JetBrains Mono, monospace" font-size="5" letter-spacing="1"
                  fill="#1a1714">RÉPUBLIQUE</text>
          </g>

          <!-- postmark, upper left -->
          <g transform="translate(150,210)" opacity="0.62">
            <circle r="38" fill="none" stroke="#1a1714" stroke-width="1.5"/>
            <circle r="44" fill="none" stroke="#1a1714" stroke-width="0.7" stroke-dasharray="2 3"/>
            <text x="0" y="-12" text-anchor="middle"
                  font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="1.5" fill="#1a1714">PARIS</text>
            <line x1="-26" y1="-2" x2="26" y2="-2" stroke="#1a1714" stroke-width="0.8"/>
            <text x="0" y="10" text-anchor="middle"
                  font-family="JetBrains Mono, monospace" font-size="7" letter-spacing="1" fill="#1a1714">— OCT —</text>
            <line x1="-26" y1="18" x2="26" y2="18" stroke="#1a1714" stroke-width="0.8"/>
            <text x="0" y="30" text-anchor="middle"
                  font-family="JetBrains Mono, monospace" font-size="7" letter-spacing="1" fill="#1a1714">XX·XX</text>
            <!-- diagonal stroke through stamp area -->
            <line x1="50" y1="-30" x2="180" y2="-50" stroke="#1a1714" stroke-width="1" opacity="0.5"/>
            <line x1="50" y1="-22" x2="180" y2="-42" stroke="#1a1714" stroke-width="1" opacity="0.5"/>
            <line x1="50" y1="-14" x2="180" y2="-34" stroke="#1a1714" stroke-width="1" opacity="0.5"/>
          </g>

          <!-- WAX SEAL — focal point at center of V -->
          <g transform="translate(320,332)">
            <!-- drips off the seal -->
            <path d="M-26,2 C-30,16 -22,28 -16,24 C-12,22 -10,14 -8,8 Z"
                  fill="#1a1714"/>
            <path d="M28,2 C32,14 24,28 18,24 C14,22 12,14 10,8 Z"
                  fill="#1a1714"/>
            <path d="M-4,28 C0,34 6,32 10,26 C8,22 4,22 -2,24 Z"
                  fill="#1a1714"/>
            <!-- main wax disc -->
            <circle r="30" fill="#1a1714"/>
            <!-- highlight crescent -->
            <path d="M-22,-10 A30,30 0 0,1 6,-26"
                  fill="none" stroke="#f8f1de" stroke-width="1.5" opacity="0.4"/>
            <!-- halftone halo around seal -->
            <circle r="38" fill="none" stroke="url(#halftone-loose)" stroke-width="6" opacity="0.45"/>
            <!-- "M" engraved in seal -->
            <text x="0" y="10" text-anchor="middle"
                  font-family="Instrument Serif, serif" font-style="italic"
                  font-size="34" font-weight="400"
                  fill="#f8f1de">M</text>
            <!-- small star/asterisk above the M -->
            <g stroke="#f8f1de" stroke-width="1.2" stroke-linecap="round" opacity="0.7">
              <line x1="0" y1="-18" x2="0" y2="-14"/>
              <line x1="-3" y1="-16" x2="3" y2="-16"/>
            </g>
          </g>

          <!-- a few tiny dust marks / paper imperfections -->
          <circle cx="120" cy="270" r="0.8" fill="#1a1714" opacity="0.4"/>
          <circle cx="450" cy="380" r="0.6" fill="#1a1714" opacity="0.4"/>
          <circle cx="220" cy="450" r="0.7" fill="#1a1714" opacity="0.35"/>
          <path d="M380,440 q3,1 7,0" stroke="#1a1714" stroke-width="0.6" fill="none" opacity="0.35"/>

        </g>

        <!-- sparkles / glow lines around the envelope -->
        <g stroke="#1a1714" stroke-width="2" stroke-linecap="round" fill="none">
          <path d="M58,150 L46,138" opacity="0.7"/>
          <path d="M50,180 L34,180" opacity="0.7"/>
          <path d="M58,210 L46,222" opacity="0.6"/>
          <path d="M584,150 L596,138" opacity="0.7"/>
          <path d="M592,180 L608,180" opacity="0.7"/>
          <path d="M584,210 L596,222" opacity="0.6"/>
          <path d="M320,80 L320,66" opacity="0.7"/>
          <path d="M296,86 L290,72" opacity="0.55"/>
          <path d="M344,86 L350,72" opacity="0.55"/>
          <path d="M320,510 L320,524" opacity="0.4"/>
        </g>

      </svg>
    </div>

    <!-- Dialogue stack — JS injects .line elements here -->
    <div class="dialogue-col">
      <div class="dialogue-stack" id="stack"></div>
    </div>

  </div>

  <!-- triggers — JS injects -->
  <div class="triggers" id="triggers"></div>

</section>

<!-- end of chapter -->
<section class="end">
  <div class="ornament">~ ~ ~</div>
  <div class="closing">
    she paid for the coffee with the letter still in her bag,
    the way you carry something you haven't decided about yet.
  </div>
  <div class="next">end of chapter one</div>
</section>

<script>
  // ----- the script of the scene -----
  // who: 'mira' | 'sam' | 'jules' | 'sam_jules' | ''
  // mode: '' (mira default, calm serif) | 'shout' (caveat all-caps) | 'whisper' (italic) | 'beat' (mono pause)
  const dialogue = [
    { who: 'mira',  mode: '',        text: "so. um. something kind of strange happened this morning." },
    { who: 'mira',  mode: 'whisper', text: "i wasn't going to mention it." },
    { who: 'sam',   mode: '',        text: "that's a sentence with teeth, mira." },
    { who: 'sam',   mode: '',        text: "that's a sentence designed to be asked about." },
    { who: 'jules', mode: '',        text: 'you can\'t open with "something strange" and then sip your coffee.' },
    { who: 'mira',  mode: 'whisper', text: "i haven't even had any of my coffee." },
    { who: 'sam',   mode: '',        text: "that's a tell." },
    { who: '',      mode: 'beat',    text: "— pause —" },

    { who: 'mira',  mode: '',        text: "a letter came." },
    { who: 'jules', mode: '',        text: "mhmm." },
    { who: 'mira',  mode: 'whisper', text: "from. um." },
    { who: 'sam',   mode: '',        text: "from?" },
    { who: 'mira',  mode: '',        text: "from me." },
    { who: '',      mode: 'beat',    text: "— silence —" },

    { who: 'jules', mode: 'whisper', text: "...as in. you mailed it to yourself." },
    { who: 'mira',  mode: '',        text: "as in. i didn't." },
    { who: 'sam',   mode: 'whisper', text: "mira." },
    { who: 'mira',  mode: '',        text: "i know how it sounds." },
    { who: 'jules', mode: '',        text: "as in the actual — the —" },
    { who: 'sam',   mode: '',        text: "she's saying it's one of those." },
    { who: 'mira',  mode: '',        text: "i'm saying it's one of those." },
    { who: 'jules', mode: 'shout',   text: "NO." },
    { who: 'sam',   mode: 'shout',   text: "WAIT. WAIT. WAIT." },
    { who: 'mira',  mode: 'whisper', text: "please." },

    { who: 'jules', mode: '',        text: "i thought those were a story." },
    { who: 'mira',  mode: '',        text: "i thought they were a story." },
    { who: 'sam',   mode: '',        text: "people get them. people get them, jules." },
    { who: 'jules', mode: '',        text: "people in essays get them. people on tv get them." },
    { who: 'jules', mode: '',        text: "not — sorry, mira — not the girl who eats the same ham sandwich every day." },
    { who: 'mira',  mode: '',        text: "it is not the same sandwich, it is a—" },
    { who: 'jules', mode: 'shout',   text: "— ham sandwich, MIRA." },
    { who: 'mira',  mode: 'whisper', text: "okay." },

    { who: 'sam',   mode: '',        text: "where is it." },
    { who: 'mira',  mode: 'whisper', text: "where's what." },
    { who: 'sam',   mode: '',        text: "don't." },
    { who: 'mira',  mode: '',        text: "it's in my bag." },
    { who: 'jules', mode: 'shout',   text: "it's in her BAG." },
    { who: 'sam',   mode: '',        text: "she brought it to coffee." },
    { who: 'mira',  mode: '',        text: "i didn't want to leave it in the apartment." },
    { who: 'sam',   mode: '',        text: "of course you didn't. of course not." },
    { who: 'jules', mode: '',        text: "show us." },
    { who: '',      mode: 'beat',    text: "— ... —" },

    { who: 'mira',  mode: 'whisper', text: "it's just an envelope." },
    { who: 'jules', mode: '',        text: "show us the envelope, mira." },
    { who: '',      mode: 'beat',    text: "— she reaches into her bag —" },

    { who: 'jules', mode: 'shout',   text: "oh my god." },
    { who: 'sam',   mode: 'shout',   text: "oh my god." },
    { who: 'jules', mode: '',        text: "that's the wax thing." },
    { who: 'sam',   mode: '',        text: "that's the wax thing." },
    { who: 'mira',  mode: 'whisper', text: "yeah." },
    { who: 'jules', mode: '',        text: "sam, that's the —" },
    { who: 'sam',   mode: '',        text: "i can see, jules." },
    { who: 'jules', mode: '',        text: "i'm just confirming." },
    { who: 'sam',   mode: '',        text: "please confirm to yourself." },

    { who: 'mira',  mode: '',        text: "my name is on it." },
    { who: 'jules', mode: '',        text: "your name." },
    { who: 'mira',  mode: '',        text: "in my handwriting." },
    { who: 'jules', mode: 'shout',   text: "WHAT." },
    { who: 'sam',   mode: '',        text: "wait. your handwriting now? or —" },
    { who: 'mira',  mode: '',        text: "i don't know. it's mine. it just looks. older." },
    { who: 'sam',   mode: 'whisper', text: "older how." },
    { who: 'mira',  mode: 'whisper', text: "less anxious." },
    { who: '',      mode: 'beat',    text: "— ... —" },

    { who: 'sam',   mode: 'whisper', text: "oh." },
    { who: 'jules', mode: 'whisper', text: "mira." },
    { who: 'mira',  mode: '',        text: "yeah." },
    { who: 'jules', mode: '',        text: "what does it say." },
    { who: '',      mode: 'beat',    text: "— ... —" },
    { who: 'mira',  mode: '',        text: "i haven't opened it." },
    { who: 'jules', mode: 'beat',    text: ".................." },
    { who: 'sam',   mode: 'beat',    text: ".................." },
    { who: 'mira',  mode: 'whisper', text: "stop looking at me like that." },
    { who: 'jules', mode: 'shout',   text: "SHE HASN'T OPENED IT." },

    { who: 'sam',   mode: '',        text: "how long have you had it." },
    { who: 'mira',  mode: 'whisper', text: "since. like. eight. this morning." },
    { who: 'sam',   mode: '',        text: "it is currently four in the afternoon." },
    { who: 'mira',  mode: '',        text: "i'm aware of the time, sam." },
    { who: 'jules', mode: 'shout',   text: "SHE HAS HAD IT FOR EIGHT HOURS." },
    { who: 'mira',  mode: 'whisper', text: "please. people are looking." },
    { who: 'jules', mode: '',        text: "let them look. the world should look." },

    { who: 'sam',   mode: '',        text: "open it." },
    { who: 'mira',  mode: '',        text: "i can't." },
    { who: 'sam',   mode: '',        text: "open it." },
    { who: 'mira',  mode: '',        text: "not here." },
    { who: 'sam',   mode: '',        text: "why not here." },
    { who: 'mira',  mode: 'whisper', text: "because." },
    { who: '',      mode: 'beat',    text: "— ... —" },
    { who: 'mira',  mode: '',        text: "because if it's the kind of thing you'd say at a cafe i want to be alone for it." },
    { who: '',      mode: 'beat',    text: "— ... —" },
    { who: 'jules', mode: 'whisper', text: "...oh." },
    { who: 'sam',   mode: 'whisper', text: "yeah. okay." },

  // ----- render -----
  const stack    = document.getElementById('stack');
  const triggers = document.getElementById('triggers');

  // Trigger spacing controls how fast lines turn over as you scroll.
  // Lower = quicker; higher = slower / more reading time per line.
  const TRIGGER_VH = 32;

  triggers.style.height = (dialogue.length * TRIGGER_VH + 100) + 'vh';

  const lineEls = dialogue.map((d, i) => {
    const line = document.createElement('div');
    line.className = 'line' + (d.mode ? ' ' + d.mode : '');
    line.dataset.i = i;
    if (d.who) {
      const who = document.createElement('div');
      who.className = 'who';
      who.innerHTML = '<span class="dot"></span>' + d.who.replace('_', ' & ');
    }
    const html = (d.who && d.mode !== 'beat')
      ? '<div class="who"><span class="dot"></span>' + d.who.replace('_', ' & ') + '</div>'
      : '';
    line.innerHTML = html + '<p>' + d.text + '</p>';
    stack.appendChild(line);
    return line;
  });

  const triggerEls = dialogue.map((_, i) => {
    const t = document.createElement('div');
    t.className = 'trigger';
    t.style.position = 'absolute';
    t.style.top = (i * TRIGGER_VH) + 'vh';
    t.style.left = '0';
    t.style.width = '1px';
    t.style.height = TRIGGER_VH + 'vh';
    triggers.appendChild(t);
    return t;
  });

  // ----- scroll engine -----
  function update() {
    const vh = window.innerHeight;
    const center = vh / 2;
    // distance over which a line fades fully in/out
    const fade = vh * 0.6;
    const drift = 28; // px of vertical drift while fading

    let bestI = -1, bestOpacity = -1;

    for (let i = 0; i < triggerEls.length; i++) {
      const r = triggerEls[i].getBoundingClientRect();
      const tCenter = r.top + r.height / 2;
      const signed = (tCenter - center) / fade;       // -1..0..+1 in active range
      const op = Math.max(0, 1 - Math.abs(signed));   // 0..1 triangle
      const ty = signed * drift;                      // below when incoming, above when leaving

      const el = lineEls[i];
      // smoothstep for a nicer ease
      const eased = op * op * (3 - 2 * op);
      el.style.opacity = eased;
      el.style.transform = `translateY(${ty}px)`;

      if (op > bestOpacity) { bestOpacity = op; bestI = i; }
    }

    for (let i = 0; i < lineEls.length; i++) {
      lineEls[i].style.zIndex = (i === bestI) ? 2 : 1;
    }
  }

  let raf;
  function tick() {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(update);
  }
  window.addEventListener('scroll', tick, { passive: true });
  window.addEventListener('resize', tick);
  update();
</script>
