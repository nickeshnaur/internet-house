<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Glance · internet.house</title>
<meta name="theme-color" content="#F7F4EE">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  .glance-stage { padding: 0; gap: 18px; }
  .frame {
    position: relative;
    width: 100%;
    max-width: 560px;
    aspect-ratio: 4 / 3;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    isolation: isolate;
  }
  .frame svg { width: 100%; height: 100%; display: block; }
  .frame::after {
    content: '';
    position: absolute; inset: 0;
    background: #000;
    opacity: 0;
    transition: opacity 800ms var(--ease);
    pointer-events: none;
  }
  .frame.faded::after { opacity: 1; }
  .frame .highlight {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-opacity: 0;
    transition: stroke-opacity 600ms var(--ease);
    filter: drop-shadow(0 0 6px var(--accent));
  }
  .frame.revealed .highlight { stroke-opacity: 0.9; animation: ring-in 800ms var(--ease); }
  @keyframes ring-in {
    0%   { stroke-opacity: 0; r: 80; }
    100% { stroke-opacity: 0.9; }
  }

  .question {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 30px 22px;
    text-align: center;
    color: var(--paper);
    opacity: 0;
    transition: opacity 600ms var(--ease);
    pointer-events: none;
  }
  .frame.asking .question { opacity: 1; pointer-events: auto; }
  .question .q {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(1.2rem, 4.8vw, 1.7rem);
    line-height: 1.3;
    letter-spacing: -0.01em;
    margin: 0 0 22px;
    max-width: 16em;
  }
  .choices {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    max-width: 22em;
  }
  .choice {
    padding: 10px 18px;
    font: 500 0.74rem 'Inter', sans-serif;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--paper);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px;
    transition: background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  @media (hover: hover) {
    .choice:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.6); }
  }
  .choice.right { background: var(--accent); border-color: var(--accent); }
  .choice.wrong { opacity: 0.4; }

  .verdict {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-size: 1.06rem;
    color: var(--ink-soft);
    letter-spacing: -0.005em;
    font-style: italic;
    min-height: 1.4em;
  }
  .verdict .right { color: var(--accent); font-style: normal; }
</style>
</head>
<body data-game="glance" data-mood="light">
  <header class="masthead">
    <a class="back" href="../">← All games</a>
    <div class="today" id="today"></div>
  </header>

  <main>
    <section class="game" data-game="glance">
      <div class="game-head">
        <div class="eyebrow">No. 013 · Glance</div>
        <h1 class="title">Glance</h1>
        <p class="rule">Three seconds of looking. One question after.</p>
        <p class="howto"><b>How to play.</b> An image appears for three seconds, then fades. A question appears about what you saw. Answer from memory. The image returns with the detail highlighted.</p>
      </div>

      <div class="toolbar">
        <button class="tool-btn" data-action="reset" data-game="glance">Look again</button>
        <button class="tool-btn" data-action="share" data-game="glance" hidden>Share</button>
        <span class="sep"></span>
        <span class="puzzle-picker" data-game="glance" role="group" aria-label="Choose puzzle">
          <button class="puzzle-pick" data-game="glance" data-idx="0" aria-current="true">1</button>
          <button class="puzzle-pick" data-game="glance" data-idx="1">2</button>
          <button class="puzzle-pick" data-game="glance" data-idx="2">3</button>
          <button class="puzzle-pick" data-game="glance" data-idx="3">4</button>
          <button class="puzzle-pick" data-game="glance" data-idx="4">5</button>
          <button class="puzzle-pick" data-game="glance" data-idx="5">6</button>
        </span>
      </div>

      <div class="stage glance-stage" id="stage-glance">
        <div class="frame" id="frame">
          <div id="scene"></div>
          <div class="question">
            <p class="q" id="q-text"></p>
            <div class="choices" id="q-choices"></div>
          </div>
        </div>
        <div class="verdict" id="verdict"></div>
        <div class="solved" id="solved-glance"><span class="check">✓</span><span class="solved-text">Seen</span></div>
      </div>
    </section>
  </main>

  <footer>
    <a href="../">internet.house · daily</a>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="../shared.js"></script>
  <script>
  (function Glance() {
    // Each scene is a self-contained <svg> SCRIPTED with a single highlight ring
    // (class="highlight") drawn over the focus of the question.
    const PUZZLES = [
      {
        id: 'glance-001',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="380" fill="#C9B894"/>
            <rect y="380" width="800" height="220" fill="#7A6E5B"/>
            <rect x="340" y="200" width="120" height="180" fill="#2A5A8A" stroke="#1F3A5F" stroke-width="3"/>
            <circle cx="438" cy="294" r="4" fill="#D4A536"/>
            <rect x="120" y="170" width="80" height="100" fill="#9BB5B0" stroke="#5F5040" stroke-width="3"/>
            <line x1="160" y1="170" x2="160" y2="270" stroke="#5F5040" stroke-width="2"/>
            <line x1="120" y1="220" x2="200" y2="220" stroke="#5F5040" stroke-width="2"/>
            <rect x="600" y="170" width="80" height="100" fill="#9BB5B0" stroke="#5F5040" stroke-width="3"/>
            <line x1="640" y1="170" x2="640" y2="270" stroke="#5F5040" stroke-width="2"/>
            <line x1="600" y1="220" x2="680" y2="220" stroke="#5F5040" stroke-width="2"/>
            <line x1="730" y1="380" x2="730" y2="120" stroke="#3A3528" stroke-width="6"/>
            <circle cx="730" cy="110" r="14" fill="#F5E29C"/>
            <g fill="#3A3528">
              <circle cx="200" cy="430" r="14"/><rect x="190" y="445" width="20" height="50" rx="4"/><rect x="195" y="495" width="6" height="30"/><rect x="205" y="495" width="6" height="30"/>
              <circle cx="400" cy="430" r="14"/><rect x="390" y="445" width="20" height="50" rx="4"/><rect x="395" y="495" width="6" height="30"/><rect x="405" y="495" width="6" height="30"/>
              <circle cx="540" cy="430" r="14"/><rect x="530" y="445" width="20" height="50" rx="4"/><rect x="535" y="495" width="6" height="30"/><rect x="545" y="495" width="6" height="30"/>
            </g>
            <g class="highlights"><circle class="highlight" cx="200" cy="465" r="40"/><circle class="highlight" cx="400" cy="465" r="40"/><circle class="highlight" cx="540" cy="465" r="40"/></g>
          </svg>`,
        question: 'How many people were walking past the door?',
        choices: ['2', '3', '4', '5'],
        answer: '3',
        caption: 'three figures, late afternoon',
      },
      {
        id: 'glance-002',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="600" fill="#EFE4D2"/>
            <rect x="0" y="420" width="800" height="180" fill="#6B5238"/>
            <rect x="0" y="408" width="800" height="14" fill="#8C6A48"/>
            <ellipse cx="240" cy="408" rx="44" ry="14" fill="#3D6B45"/>
            <rect x="206" y="248" width="68" height="160" fill="#3D6B45"/>
            <ellipse cx="240" cy="248" rx="34" ry="10" fill="#4D7A55"/>
            <g><circle cx="218" cy="218" r="14" fill="#D9B05C"/><circle cx="240" cy="200" r="16" fill="#E8C97A"/><circle cx="262" cy="222" r="14" fill="#D9B05C"/></g>
            <line x1="218" y1="218" x2="220" y2="252" stroke="#5F4628" stroke-width="2"/>
            <line x1="240" y1="200" x2="240" y2="252" stroke="#5F4628" stroke-width="2"/>
            <line x1="262" y1="222" x2="262" y2="252" stroke="#5F4628" stroke-width="2"/>
            <g fill="#B33A3A"><circle cx="400" cy="392" r="22"/><circle cx="440" cy="384" r="20"/><circle cx="372" cy="386" r="18"/><circle cx="416" cy="370" r="20"/></g>
            <rect x="500" y="356" width="170" height="52" fill="#D6C8A9" stroke="#7A6442" stroke-width="2"/>
            <rect x="500" y="356" width="170" height="14" fill="#A88E64"/>
            <g class="highlights"><circle class="highlight" cx="240" cy="328" r="80"/></g>
          </svg>`,
        question: 'What color was the vase on the table?',
        choices: ['red', 'green', 'white', 'brown'],
        answer: 'green',
        caption: 'green vase, three small sunflowers',
      },
      {
        id: 'glance-003',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="600" fill="#E2D6BB"/>
            <rect x="120" y="80" width="560" height="440" fill="#A6BBC9" stroke="#5C5142" stroke-width="6"/>
            <line x1="400" y1="80" x2="400" y2="520" stroke="#5C5142" stroke-width="6"/>
            <line x1="120" y1="300" x2="680" y2="300" stroke="#5C5142" stroke-width="6"/>
            <rect x="80"  y="510" width="640" height="20" fill="#7A5F3F"/>
            <g fill="#3A3528">
              <ellipse cx="540" cy="478" rx="60" ry="26"/>
              <circle cx="500" cy="464" r="20"/>
              <polygon points="488,448 496,432 504,448"/>
              <polygon points="508,448 514,432 522,448"/>
              <line x1="478" y1="464" x2="464" y2="466" stroke="#3A3528" stroke-width="1.6"/>
              <line x1="478" y1="466" x2="464" y2="470" stroke="#3A3528" stroke-width="1.6"/>
            </g>
            <g><rect x="200" y="430" width="44" height="70" fill="#7A2E2E"/><rect x="200" y="430" width="44" height="6" fill="#5A1E1E"/></g>
            <g><rect x="244" y="440" width="38" height="60" fill="#2E5A7A"/><rect x="244" y="440" width="38" height="5" fill="#1E3A5A"/></g>
            <g><rect x="282" y="448" width="30" height="52" fill="#7A6A2E"/><rect x="282" y="448" width="30" height="5" fill="#5A4A1E"/></g>
            <g class="highlights"><ellipse class="highlight" cx="510" cy="466" rx="58" ry="40"/></g>
          </svg>`,
        question: 'What animal was on the window sill?',
        choices: ['a bird', 'a cat', 'a dog', 'nothing'],
        answer: 'a cat',
        caption: 'one cat at the right pane, three small books at the left',
      },
      {
        id: 'glance-004',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="600" fill="#F0E5CE"/>
            <rect x="0" y="380" width="800" height="220" fill="#B89770"/>
            <rect x="0" y="370" width="800" height="14" fill="#7A5F3F"/>
            <g><rect x="120" y="220" width="80" height="160" fill="#9C2E2E" stroke="#5A1E1E" stroke-width="3"/><rect x="160" y="200" width="20" height="24" fill="#9C2E2E"/><rect x="155" y="195" width="30" height="8" fill="#5A1E1E"/><polygon points="165,200 200,180 200,210" fill="#5A1E1E"/></g>
            <g fill="#5C4438"><circle cx="280" cy="345" r="22"/><rect x="262" y="350" width="36" height="22" rx="3"/></g>
            <g fill="#3A3528"><circle cx="350" cy="345" r="22"/><rect x="332" y="350" width="36" height="22" rx="3"/></g>
            <g fill="#A8C3DE"><circle cx="420" cy="345" r="22"/><rect x="402" y="350" width="36" height="22" rx="3"/></g>
            <g fill="#D4A536"><circle cx="490" cy="345" r="22"/><rect x="472" y="350" width="36" height="22" rx="3"/></g>
            <g class="highlights"><ellipse class="highlight" cx="160" cy="290" rx="60" ry="100"/></g>
          </svg>`,
        question: 'What color was the kettle on the counter?',
        choices: ['black', 'red', 'silver', 'green'],
        answer: 'red',
        caption: 'a red kettle on the left, four mugs lined up to the right',
      },
      {
        id: 'glance-005',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="380" fill="#A8D5E2"/>
            <rect y="380" width="800" height="220" fill="#7C9E5C"/>
            <g><circle cx="160" cy="260" r="60" fill="#3D6B45"/><rect x="155" y="320" width="10" height="60" fill="#5C3A1E"/></g>
            <g><circle cx="640" cy="240" r="78" fill="#3D6B45"/><rect x="635" y="320" width="10" height="60" fill="#5C3A1E"/></g>
            <g fill="#D4A536"><circle cx="280" cy="430" r="14"/><circle cx="280" cy="445" r="6" fill="#A78229"/></g>
            <g fill="#C25E3A"><circle cx="380" cy="450" r="14"/><circle cx="380" cy="465" r="6" fill="#8C3E20"/></g>
            <g fill="#A78BFA"><circle cx="490" cy="440" r="14"/><circle cx="490" cy="455" r="6" fill="#7053C5"/></g>
            <g class="highlights"><circle class="highlight" cx="160" cy="280" r="80"/><circle class="highlight" cx="640" cy="260" r="98"/></g>
          </svg>`,
        question: 'How many trees were in the scene?',
        choices: ['1', '2', '3', '4'],
        answer: '2',
        caption: 'two trees, three flowers in the foreground',
      },
      {
        id: 'glance-006',
        scene: `
          <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="800" height="600" fill="#E8DBC4"/>
            <rect x="60" y="120" width="680" height="380" fill="#7A5F3F"/>
            <rect x="80" y="140" width="640" height="340" fill="#3A2A1A"/>
            <g fill="#A6BBC9"><rect x="140" y="280" width="50" height="180"/><rect x="200" y="240" width="50" height="220"/><rect x="260" y="270" width="50" height="190"/><rect x="320" y="220" width="50" height="240"/><rect x="380" y="290" width="50" height="170"/></g>
            <g fill="#D4A536"><rect x="140" y="280" width="50" height="14"/><rect x="200" y="240" width="50" height="14"/><rect x="260" y="270" width="50" height="14"/><rect x="320" y="220" width="50" height="14"/><rect x="380" y="290" width="50" height="14"/></g>
            <g fill="#3A3528"><circle cx="500" cy="380" r="30"/><circle cx="490" cy="370" r="3" fill="#D4A536"/><circle cx="510" cy="370" r="3" fill="#D4A536"/></g>
            <g fill="#5C4438"><rect x="600" y="320" width="40" height="80"/><rect x="595" y="310" width="50" height="14"/><rect x="610" y="200" width="20" height="120"/></g>
            <g class="highlights"><rect class="highlight" x="120" y="200" width="320" height="280"/></g>
          </svg>`,
        question: 'How many books were on the shelf?',
        choices: ['3', '4', '5', '6'],
        answer: '5',
        caption: 'five books on the shelf, a black cat on the floor, a lamp at right',
      },
    ];
    let pIdx = 0, PUZZLE = PUZZLES[pIdx];

    const frameEl   = $('#frame');
    const sceneEl   = $('#scene');
    const qTextEl   = $('#q-text');
    const qChoicesEl= $('#q-choices');
    const verdictEl = $('#verdict');
    const solvedEl  = $('#solved-glance');
    const stageEl   = $('#stage-glance');
    const shareBtn  = document.querySelector('.tool-btn[data-game="glance"][data-action="share"]');

    let timerId = null;
    let state = 'init'; // 'init' | 'viewing' | 'asking' | 'revealed'
    let chosen = null;

    function build() {
      cleanup();
      sceneEl.innerHTML = PUZZLE.scene;
      qTextEl.textContent = PUZZLE.question;
      qChoicesEl.innerHTML = PUZZLE.choices.map(c =>
        `<button class="choice" data-choice="${c}">${c}</button>`
      ).join('');
      qChoicesEl.querySelectorAll('.choice').forEach(b => b.addEventListener('click', onChoose));
      frameEl.classList.remove('faded', 'asking', 'revealed');
      verdictEl.innerHTML = '';
      solvedEl.classList.remove('show', 'is-revealed');
      shareBtn.hidden = true;
      chosen = null;
      state = 'viewing';
      // After exactly 3 seconds, fade and ask.
      timerId = setTimeout(() => {
        frameEl.classList.add('faded');
        setTimeout(() => frameEl.classList.add('asking'), 700);
        state = 'asking';
      }, 3000);
    }

    function cleanup() {
      if (timerId) { clearTimeout(timerId); timerId = null; }
    }

    function onChoose(e) {
      if (state !== 'asking') return;
      chosen = e.currentTarget.dataset.choice;
      const right = chosen.toLowerCase() === PUZZLE.answer.toLowerCase();
      qChoicesEl.querySelectorAll('.choice').forEach(b => {
        if (b.dataset.choice === PUZZLE.answer) b.classList.add('right');
        else if (b.dataset.choice === chosen)   b.classList.add('wrong');
      });
      setTimeout(() => {
        frameEl.classList.remove('asking', 'faded');
        frameEl.classList.add('revealed');
        verdictEl.innerHTML = right
          ? `<span class="right">You saw it.</span> ${PUZZLE.caption}.`
          : `Not this time. <em>${PUZZLE.caption}</em>.`;
        solvedEl.querySelector('.solved-text').textContent = right ? 'Seen' : 'Looked';
        solvedEl.classList.add('show');
        if (!right) solvedEl.classList.add('is-revealed');
        shareBtn.hidden = false;
        state = 'revealed';
        flashReveal(stageEl);
        haptic(right ? 14 : 6);
      }, 700);
    }

    function reset() { build(); }
    function load(i) {
      pIdx = ((i % PUZZLES.length) + PUZZLES.length) % PUZZLES.length;
      PUZZLE = PUZZLES[pIdx];
      reset();
    }
    function share() {
      const right = chosen && chosen.toLowerCase() === PUZZLE.answer.toLowerCase();
      copyShare(`Glance · ${right ? 'saw it' : 'missed it'}\n${PUZZLE.question}\ninternet.house/game`);
    }

    build();
    GAMES.glance = { reset, share, load };
  })();
  </script>
</body>
</html>
